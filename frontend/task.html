<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef2e6;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#3b4a1a;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#6b7d3a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.task{
    background:#f8f9f3;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.task.completed{
    border-left:5px solid green;
}

.task.pending{
    border-left:5px solid orange;
}

.task button{
    width:auto;
    margin:5px;
    padding:5px 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<input id="title" placeholder="Task title">
<input id="desc" placeholder="Task description">

<select id="status">
<option value="pending">Pending</option>
<option value="completed">Completed</option>
</select>

<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

</div>

<script defer src="./script.js"></script>
</body>
</html>
